services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-callroute}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-callroute_secret}
      POSTGRES_DB: ${POSTGRES_DB:-callroute_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-callroute} -d ${POSTGRES_DB:-callroute_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app/api
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
      - model_artifacts:/app/models
    # PYTHONPATH=/app задан в Dockerfile; api.main:app — правильный путь
    command: sh -c "alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload"

  worker-fast:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file: .env
    environment:
      - WORKER_TYPE=fast
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # НЕ монтируем ./worker:/app — это перезапишет файлы из образа
      # Монтируем только то, что нужно изменять на лету:
      - model_artifacts:/app/models
    command: celery -A celery_app worker -Q fast -c 4 -n worker-fast@%h --loglevel=info

  worker-smart:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file: .env
    environment:
      - WORKER_TYPE=smart
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model_artifacts:/app/models
    command: celery -A celery_app worker -Q smart,batch -c 2 -n worker-smart@%h --loglevel=info

  beat:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file: .env
    environment:
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A celery_app beat --loglevel=info

  streamlit:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      - api
    volumes:
      - ./dashboard:/app

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - streamlit

volumes:
  postgres_data:
  grafana_data:
  model_artifacts:
