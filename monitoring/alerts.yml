groups:
  - name: callroute_alerts
    rules:
      - alert: HighRefundRate
        expr: rate(billing_credits_charged_total[5m]) == 0 and rate(http_requests_total{status_code="402"}[5m]) > 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High refund rate detected"

      - alert: CeleryQueueBacklog
        expr: celery_queue_length{queue_name="smart"} > 50
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Smart queue backlog > 50 tasks"

      - alert: LowConfidenceSpike
        expr: rate(ml_low_confidence_total[1m]) > 10
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Low confidence spike: > 10 predictions/min"

      - alert: APILatencyP99
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "API p99 latency > 2s"

      - alert: WorkerDown
        expr: rate(celery_tasks_total[3m]) == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Celery worker appears down — no tasks processed in 3 min"
