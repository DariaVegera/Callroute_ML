global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: "/metrics"

  - job_name: "worker-fast"
    static_configs:
      - targets: ["worker-fast:9100"]

  - job_name: "worker-smart"
    static_configs:
      - targets: ["worker-smart:9100"]

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
